<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>WhatsApp API</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root { color-scheme: light dark; }
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 24px; }
    #app { max-width: 720px; margin: auto; }
    h1 { margin-top: 0; }
    #qrcode { display: none; width: 300px; height: 300px; border: 1px solid #ddd; background: #fff; }
    ul.logs { list-style: disc; padding-left: 20px; }
    .muted { color: #666; }
    .row { display:flex; gap:24px; align-items:flex-start; flex-wrap: wrap; }
    .panel { flex: 1 1 320px; }
    code { background:#f5f5f5; padding:2px 4px; border-radius:4px; }
    @media (prefers-color-scheme: dark) {
      code { background:#222; }
      #qrcode { border-color:#444; }
      .muted { color:#999; }
    }
  </style>
</head>
<body>
  <div id="app">
    <h1>WhatsApp API</h1>
    <p class="muted">
      Aguarde o QR aparecer e escaneie com o WhatsApp do celular. Se nada aparecer, confira o console do servidor e a rota
      <code>/status</code>.
    </p>

    <div class="row">
      <div class="panel">
        <img src="" alt="QR Code" id="qrcode">
      </div>
      <div class="panel">
        <h3>Logs</h3>
        <ul class="logs"></ul>
      </div>
    </div>
  </div>

  <!-- jQuery e Socket.IO (v2.3.0 para compatibilidade com o servidor) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.1/jquery.min.js" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/2.3.0/socket.io.js" crossorigin="anonymous"></script>

  <script>
    $(function(){
      var socket = io();

      function addLog(text) {
        $('.logs').append($('<li>').text(text));
        // scroll até o fim
        var logs = document.querySelector('.logs');
        logs.scrollTop = logs.scrollHeight;
      }

      socket.on('connect', function(){
        addLog('Conectado ao servidor de WebSocket.');
      });

      socket.on('disconnect', function(){
        addLog('Desconectado do servidor de WebSocket.');
      });

      socket.on('message', function(msg){
        addLog(msg);
      });

      // Recebe a imagem do QR como data URL (data:image/png;base64,...)
      socket.on('qr', function(src){
        $('#qrcode').attr('src', src).show();
        addLog('QR recebido. Escaneie para autenticar.');
      });

      socket.on('ready', function(){
        $('#qrcode').hide();
        addLog('Dispositivo pronto.');
      });

      socket.on('authenticated', function(){
        $('#qrcode').hide();
        addLog('Sessão autenticada.');
      });
    });
  </script>
</body>
</html>
